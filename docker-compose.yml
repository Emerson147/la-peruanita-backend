services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: laperuanita-postgres
    environment:
      POSTGRES_DB: laperuanita_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: laperuanita2024
    ports:
      - "5434:5432"
    volumes:
      - laperuanita-data:/var/lib/postgresql/data
    networks:
      - laperuanita-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  # Backend Spring Boot
  app:
    build: .
    container_name: laperuanita-app
    ports:
      - "8081:8081"
    environment:
      # Conexión interna de Docker: se conecta al servicio "postgres" de arriba
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/laperuanita_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: laperuanita2024
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: laperuanita-secret-key-muy-larga-para-que-sea-segura-2024-emersondev
      JWT_EXPIRATION: 86400000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - laperuanita-network
    restart: on-failure
volumes:
  laperuanita-data:
networks:
  laperuanita-network:
    driver: bridge
